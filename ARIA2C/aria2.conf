# --- RUTAS Y SESIÓN ---
# Directorio base (se sobreescribirá con el .bat, pero es bueno tenerlo)
dir=${USERPROFILE}/Downloads/FromAria
# Guarda el progreso para reanudar descargas cortadas
input-file=aria2.session
save-session=aria2.session
save-session-interval=60

# --- CONEXIÓN RPC (Para la extensión del navegador) ---
enable-rpc=true
rpc-listen-all=true
rpc-allow-origin-all=true
rpc-listen-port=6800
# Define un token de seguridad (debe ser el mismo en la extensión)
rpc-secret=972279

# --- AUTOMATIZACIÓN ---
# Ejecuta el clasificador al terminar cada descarga
on-download-complete=mover_archivos.bat

# --- OPTIMIZACIÓN ---
max-connection-per-server=16
split=16
min-split-size=1M